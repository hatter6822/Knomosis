#
# Production secp256k1-verifier link verification (security-review F-2).
#
# The default `lake build` links the Lean-opaque verifier fallback, so
# `knomosis verify-check` fails closed (exit 1) — the F-1/F-2 fail-closed
# property is asserted in the main `ci.yml` job.  THIS workflow proves
# the other half: that linking the REAL secp256k1 adaptor flips
# `verify-check` to exit 0 with the production identifier (so the gate
# genuinely distinguishes production from fallback, not vacuously).
#
# All orchestration lives in `scripts/verify_secp256k1_link.sh`; this
# workflow just provisions lean + rust and runs it.

name: CI (Verify secp256k1 Link)

on:
  pull_request:
    branches:
      - main
    paths:
      - 'runtime/knomosis-verify-secp256k1/**'
      - 'runtime/knomosis-verify-fallback.c'
      - 'runtime/knomosis-hash-fallback.c'
      - 'runtime/Cargo.toml'
      - 'runtime/Cargo.lock'
      - 'runtime/rust-toolchain.toml'
      - 'LegalKernel/Bridge/VerifyAdaptor.lean'
      - 'Main.lean'
      - 'lakefile.lean'
      - 'lean-toolchain'
      - 'scripts/verify_secp256k1_link.sh'
      - '.github/workflows/ci-verify-secp256k1.yml'
  push:
    branches:
      - main
    paths:
      - 'runtime/knomosis-verify-secp256k1/**'
      - 'runtime/knomosis-verify-fallback.c'
      - 'runtime/knomosis-hash-fallback.c'
      - 'runtime/Cargo.toml'
      - 'runtime/Cargo.lock'
      - 'runtime/rust-toolchain.toml'
      - 'LegalKernel/Bridge/VerifyAdaptor.lean'
      - 'Main.lean'
      - 'lakefile.lean'
      - 'lean-toolchain'
      - 'scripts/verify_secp256k1_link.sh'
      - '.github/workflows/ci-verify-secp256k1.yml'
  schedule:
    # Nightly at 06:30 UTC — backstop for link / symbol drift originating
    # outside the path-filtered PR surface (offset from the keccak
    # nightly at 06:00 to spread runner load).
    - cron: '30 6 * * *'
  workflow_dispatch:

# Cancel in-progress runs of the same workflow on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# `contents: read` for actions/checkout; `actions: write` for the narrow
# rust-cache save scope (NOT a repo-write permission).
permissions:
  contents: read
  actions: write

env:
  CARGO_TERM_COLOR: never
  CARGO_INCREMENTAL: '0'
  RUST_BACKTRACE: '1'

jobs:
  verify-secp256k1-link:
    name: secp256k1 verifier production-link (F-2)
    runs-on: ubuntu-latest
    # Budget: one Rust staticlib build (--features lean-ffi) plus two
    # Lean `knomosis` exe links (default + production-linked).
    timeout-minutes: 40
    steps:
      - name: Checkout
        # actions/checkout v4.3.1 (same SHA pinned across the CI suite).
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Lean toolchain
        # leanprover/lean-action v1.5.0.  Installs elan + lean + lake from
        # `lean-toolchain`; we drive every Lean invocation from the verify
        # script (it must control KNOMOSIS_VERIFY_STATICLIB at link time).
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9
        with:
          build: false
          test: false
          lint: false

      - name: Install Rust toolchain (per rust-toolchain.toml)
        shell: bash
        working-directory: runtime
        run: |
          rustup show active-toolchain || true
          rustup show
          cargo --version
          rustc --version

      - name: Cache cargo artifacts
        # Swatinem/rust-cache v2.7.7 (same SHA pinned by ci-rust.yml).  The
        # verify staticlib is built into an isolated, rm-rf'd target dir by
        # the script (FFI shim rebuilt each run), so only dependency
        # downloads are accelerated here.
        uses: Swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3
        with:
          workspaces: runtime
          shared-key: verify-secp256k1-link

      - name: Verify the production secp256k1 link flips verify-check (F-2)
        # Builds the real secp256k1 adaptor staticlib, records its SHA-256
        # (F-2a), asserts the default build's verify-check exits 1
        # (fail-closed baseline), links the adaptor and asserts
        # verify-check exits 0 (F-2b).  A green run proves the gate
        # distinguishes production from fallback.
        shell: bash
        run: ./scripts/verify_secp256k1_link.sh
