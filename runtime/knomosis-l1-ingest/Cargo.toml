# `knomosis-l1-ingest` — RH-B.  The L1 watcher daemon that translates
# Ethereum bridge / identity-registry events to Knomosis `SignedAction`s
# and forwards them to `knomosis-host`.
#
# Build artefacts:
#   * `rlib` (library) — consumed by integration tests, the
#     fixture-corpus generator under `examples/`, and downstream
#     crates (RH-G).  Exposes the core types and the
#     `translate` / `signing_input` / `sign_action` pure functions.
#   * Binary (`knomosis-l1-ingest`) — long-running daemon entry point
#     wiring CLI flags → keystore → watcher → submitter.
#
# Production deployments wire an Ethereum JSON-RPC endpoint (or a
# user-supplied `L1Source` impl) and a `knomosis-host` URL via CLI
# flags; the daemon emits ingest progress as `tracing` events and
# halts loudly on any precondition violation that operator
# intervention can resolve.
#
# Cross-stack equivalence is enforced by the fixture corpus under
# `runtime/tests/cross-stack/l1_ingest.cxsf` (`FixtureKind::L1Ingest`):
# every fixture record is an `(L1 event hex, expected Action CBE
# bytes)` pair generated by the example binary.  The integration
# tests assert byte-equality against the Lean reference
# (`LegalKernel/Bridge/Ingest.lean`).

[package]
name = "knomosis-l1-ingest"
description = "Ethereum L1 event ingest daemon for Knomosis (RH-B)."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish.workspace = true

[lib]
# Standard rlib.  No FFI surface (the ingestor is a Rust-only
# orchestrator); the L1Source / Submitter traits are pure Rust.
path = "src/lib.rs"

[[bin]]
name = "knomosis-l1-ingest"
path = "src/main.rs"

# The fixture-corpus generator runs under `cargo run --example
# gen_ingest_fixtures -- [output-path]`.  Re-generating the corpus
# is a deliberate developer action; the committed `.cxsf` file
# under `runtime/tests/cross-stack/l1_ingest.cxsf` is the
# canonical reference.
[[example]]
name = "gen_ingest_fixtures"
path = "examples/gen_ingest_fixtures.rs"

# Workstream GP.6.1: the fee-split corpus generator.  Produces
# `runtime/tests/cross-stack/l1_ingest_fee_split.cxsf` covering
# `DepositWithFee` CBE-encoding byte-equivalence with the Lean
# reference.  Run via:
#
#   cargo run --example gen_fee_split_fixtures -- \
#       tests/cross-stack/l1_ingest_fee_split.cxsf
[[example]]
name = "gen_fee_split_fixtures"
path = "examples/gen_fee_split_fixtures.rs"

[dependencies]
knomosis-cli-common = { workspace = true }
# `k256` provides the ECDSA signing primitive that bridge-actor
# private keys feed into.  `default-features = false` (workspace
# default) keeps the production cdylib lean; the ingestor itself
# additionally enables `std` (we are a binary, not a no-std
# target).
k256 = { workspace = true, features = ["ecdsa", "arithmetic", "std"] }
# `sha3` provides the Keccak-256 primitive used for receipt-hash
# computation matching the Solidity bridge's `keccak256(abi.encode
# (...))` discipline.  Workspace-default `default-features =
# false` is sufficient (we use `Digest::update` / `finalize`,
# which are no-std).
sha3 = { workspace = true }
# `zeroize` wraps the bridge-actor private key so it scrubs
# securely on drop — see `src/key.rs` for the usage discipline.
zeroize = { workspace = true }
# `thiserror` derives our typed errors with `Display` /
# `std::error::Error` impls and `#[from]` conversions.
thiserror = { workspace = true }
# `tracing` is the structured-logging API.  The daemon uses
# `tracing::info` / `tracing::warn` / `tracing::error` plus a
# small set of spans to mark watcher iterations.
tracing = { workspace = true }
# `tracing-subscriber` initialises the logging pipeline (via
# `knomosis-cli-common::logging::init`).
tracing-subscriber = { workspace = true }
# `serde` / `serde_json` underpin JSON-RPC framing.  No production
# code path takes attacker-controllable JSON without first
# validating each field against the typed envelopes in
# `src/source.rs`.
serde = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
# `knomosis-cross-stack` is the load-bearing fixture loader RH-B's
# tests use to read `l1_ingest.cxsf` and assert byte-equivalence
# against the Lean reference.
knomosis-cross-stack = { workspace = true }
# `hex` is the dev-only fixture / log encoding helper used by the
# tests and the fixture generator.
hex = { workspace = true }
# `proptest` powers the property tests over CBE encoding and the
# re-org sliding-window invariants.
proptest = { workspace = true }
# `tempfile` provides isolated tempdirs for the storage / resume
# tests.  Pin lives at the workspace level.
tempfile = { workspace = true }
# `knomosis-host` is a DEV-only dependency (FQ.13a): the raw-TCP
# submitter's framing is hand-rolled (keeping the runtime tree lean,
# matching this crate's hand-rolled-CBE philosophy), and the tests pin
# it byte-for-byte against the canonical `knomosis_host::frame` encoders
# (single source of truth) and drive it end-to-end against a real
# in-process `knomosis-host`.  Acyclic: knomosis-host does not depend on
# this crate.
knomosis-host = { path = "../knomosis-host" }

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
# `missing_errors_doc` / `missing_panics_doc` are pedantic lints
# whose value is the rustc `missing_docs` lint, which fires on
# every public surface.  We already require that.
missing_errors_doc = "allow"
missing_panics_doc = "allow"
# `module_name_repetitions` triggers on names like
# `IngestError` inside a `knomosis_l1_ingest` crate.  Workspace
# convention.
module_name_repetitions = "allow"
# `must_use_candidate` is a stylistic suggestion that fires on
# every pure getter / constructor.  Allowing it keeps the surface
# focused on safety-relevant lints.
must_use_candidate = "allow"
# Stylistic lints below: each is a personal-preference issue
# rather than a correctness or safety concern.  Allowing them in
# this crate keeps the audit focus on the safety-relevant lints
# enabled by `pedantic`.
manual_let_else = "allow"
single_match_else = "allow"
# `doc_markdown` fires on prose words that look like type names
# but lack backticks (e.g. "RegisteredECDSA" mentioned in a
# Markdown-context docstring).  The fixes are pure cosmetics.
doc_markdown = "allow"
# `too_many_lines` complains about > 100-line functions; our
# CBE encoder match-on-Action and the watcher orchestration loop
# legitimately exceed this.
too_many_lines = "allow"
# `cast_possible_truncation` fires every time we cast `u64` to
# `usize`.  The casts are bounds-checked at the wire-format
# layer (every length field is validated `<= MAX_RECORD_BYTES`
# before being used as a slice index).  Re-asserting via casts
# elsewhere is noise.
cast_possible_truncation = "allow"
# `cast_possible_wrap` fires on `usize -> isize` casts that we
# don't perform; the workspace's other crates allow it for
# similar reasons.
cast_possible_wrap = "allow"
# `needless_pass_by_value` fires on `_: Vec<Verdict>` parameters
# we explicitly intend to consume.  The pedantic suggestion
# would force an unnecessary `&[Verdict]` + `clone()`.
needless_pass_by_value = "allow"
# `unreadable_literal` fires on literals like `0x0102_0304` that
# we already write in grouped form; it also fires on the
# secp256k1 half-order constant which is intentionally a flat
# 32-byte representation.
unreadable_literal = "allow"
# `format_in_format_args` is a pedantic style guard; allowing it
# keeps the diagnostic-string format inline rather than
# splitting into local `let` bindings.
format_in_format_args = "allow"
# `manual_find` fires on the `EventTopic::from_hash` loop and
# the re-org sliding-window walk-back.  Both are clearer as
# explicit loops because the body's predicate has a `break`-
# adjacent assignment that doesn't fit `find`'s closure shape.
manual_find = "allow"
# `if_then_some_else_none` fires on the conditional-encoding
# helpers — the explicit form is clearer than the closure
# composition.
if_then_some_else_none = "allow"
# `match_wildcard_for_single_variants` fires on the encoder's
# exhaustive match where the catch-all is the safest default
# (rather than enumerating every variant).
match_wildcard_for_single_variants = "allow"
# `cast_sign_loss` fires on legitimate `i32 -> u32` casts that
# guard the boundary via assertions; allowing it removes noise.
cast_sign_loss = "allow"
# `unnested_or_patterns` is purely stylistic; allowing keeps
# the most-readable form for the watcher's verdict matching.
unnested_or_patterns = "allow"
# `useless_format` fires when `format!("literal")` could be
# replaced by `String::from("literal")` or `.to_string()`.  The
# differences are negligible.
useless_format = "allow"
# `from_iter_instead_of_collect` is a pedantic-only style guard.
from_iter_instead_of_collect = "allow"
# `iter_with_drain` / `into_iter_loop` are pedantic style
# variations.
iter_without_into_iter = "allow"
# `redundant_closure_for_method_calls` is pedantic style.
redundant_closure_for_method_calls = "allow"
# `default_trait_access` fires on `Default::default()` calls
# that we use intentionally for clarity.
default_trait_access = "allow"
# `derive_partial_eq_without_eq` doesn't apply since we derive
# both, but allow for any sibling cases.
derive_partial_eq_without_eq = "allow"
# `option_if_let_else` is a style suggestion that conflicts with
# `single_match_else` in some cases.
option_if_let_else = "allow"
# `redundant_else` is purely stylistic.
redundant_else = "allow"
# `for_kv_map` fires on `for (k, _v) in map.iter()` patterns.
# The explicit form is more readable when the intent is to walk
# every entry.
for_kv_map = "allow"
# `needless_continue` is a style guard.
needless_continue = "allow"
# `large_enum_variant` fires for enums with size-disparate variants;
# our `IngestedEvent` is a natural example (some variants are larger
# than others) and boxing the large variant adds an extra
# allocation per event.
large_enum_variant = "allow"

[lints.rust]
missing_docs = "warn"
unreachable_pub = "warn"
# `forbid` is appropriate here: the ingestor is a pure-Rust
# orchestrator with no FFI surface; if we ever need `unsafe`, it's
# a review-blocker, not a lint relaxation.
unsafe_code = "forbid"
