[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "/usr/local/bin/solc"
evm_version = "shanghai"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [
    { access = "read-write", path = "./test/fixtures" },
    { access = "read", path = "./test/CrossCheck/fixtures" },
    { access = "read", path = "./test/goldens" }
]
gas_reports = ["*"]
verbosity = 2
fuzz = { runs = 256 }

[profile.ci]
fuzz = { runs = 1000 }

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"
number_underscore = "thousands"
