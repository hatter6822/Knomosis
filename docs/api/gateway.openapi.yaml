# Knomosis Gateway API — OpenAPI 3.1 contract sketch (DRAFT).
# North-side (consumer-facing) protocol for the proposed `knomosis-gateway`
# service.  Rationale + ABI mappings: docs/planning/gateway_integration_plan.md.
openapi: 3.1.0
info:
  title: Knomosis Gateway API
  version: 0.1.0
  summary: >-
    HTTP/JSON + SSE gateway fronting the Knomosis binary host, event-subscribe,
    and indexer surfaces for browser-facing consumers (first consumer: Licio BFF).
  description: |
    DRAFT contract sketch.  Defines the consumer-facing protocol for the
    proposed `knomosis-gateway` service, which bridges Knomosis's binary
    CBE-over-socket protocols (abi.md §10/§11/§11A) to HTTP/JSON + Server-Sent
    Events so a TypeScript BFF (Licio's Hono layer) can consume them.

    Cross-cutting conventions:
      * Big integers as strings. All 64-bit-or-wider integers (amounts,
        balances, budgets, nonces, sequence numbers) are serialized as DECIMAL
        STRINGS to avoid IEEE-754 precision loss in JSON / JavaScript consumers.
      * Verdict != HTTP status. The kernel admissibility verdict is orthogonal
        to the transport status. A well-formed action the kernel declines
        (e.g. `InsufficientBudget`) is HTTP 200 with `accepted: false`, NOT a
        4xx. Transport / availability faults use 4xx/5xx. See abi.md §10.2.
      * Eventual consistency. State reads are served from the `knomosis-indexer`
        view (abi.md §11A), which lags the canonical log. The `X-Knomosis-Seq`
        response header carries the cursor the response reflects; clients
        reconcile reads against the event stream using it.
      * Opaque forwarding. `POST /actions` forwards the client-signed CBE bytes
        VERBATIM; the gateway never re-encodes them (the ECDSA signature is over
        the canonical CBE encoding).
  license:
    name: GPL-3.0-or-later
    url: https://github.com/hatter6822/Knomosis/blob/main/LICENSE
  contact:
    name: Knomosis
    url: https://github.com/hatter6822/Knomosis

servers:
  - url: https://gateway.dev.example/v1
    description: Development gateway (in-memory / devnet kernel behind it).
  - url: https://gateway.example/v1
    description: Production gateway.

tags:
  - name: actions
    description: Submit signed actions for kernel admission (write path → knomosis-host, abi.md §10).
  - name: state
    description: Read balances / budgets / pools from the indexer view (abi.md §11A).
  - name: events
    description: Backfill and live-stream sequenced events (abi.md §11).
  - name: system
    description: Service metadata and health.

# Default: every operation requires a server-to-server credential from the BFF.
# Health endpoints override this with `security: []`.
security:
  - bearerAuth: []

paths:
  /actions:
    post:
      tags: [actions]
      operationId: submitAction
      summary: Submit a pre-signed action for kernel admission.
      description: |
        Forwards an opaque, client-signed `SignedAction` (canonical CBE bytes)
        verbatim to `knomosis-host` (abi.md §10) and returns the kernel verdict.
        The gateway MUST NOT re-encode the payload.

        Verdict → status (abi.md §10.2):
          * Ok            → 200, `{ accepted: true,  verdict: "Ok" }`
          * NotAdmissible → 200, `{ accepted: false, verdict: "NotAdmissible", reason }`
          * Busy          → 503 + `Retry-After`
          * ParseError    → 400

        Idempotency: re-submitting the same signed action is safe — the kernel's
        nonce-consumption (`replay_impossible`) makes a replay a deterministic
        `NotAdmissible`. Supply `Idempotency-Key` so the gateway can dedup
        in-flight retries.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ActionSubmission' }
            examples:
              transfer:
                summary: Base64-wrapped CBE SignedAction.
                value:
                  encoding: cbe
                  signedAction: "o2NhY3Rpb24..."
          application/octet-stream:
            schema:
              type: string
              format: binary
              description: Raw canonical CBE `SignedAction` bytes (no wrapper).
      responses:
        '200':
          description: The kernel processed the action and returned a verdict (Ok or NotAdmissible).
          headers:
            X-Knomosis-Seq: { $ref: '#/components/headers/KnomosisSeq' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VerdictResponse' }
              examples:
                ok:
                  summary: Admitted; L2 state advanced.
                  value: { accepted: true, verdict: Ok, admissionStage: Finalized, seq: "104233" }
                budget:
                  summary: Well-formed but declined (GP budget gate).
                  value: { accepted: false, verdict: NotAdmissible, reason: InsufficientBudget }
        '400': { $ref: '#/components/responses/ParseError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '413': { $ref: '#/components/responses/PayloadTooLarge' }
        '415': { $ref: '#/components/responses/UnsupportedMediaType' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '502': { $ref: '#/components/responses/UpstreamUnavailable' }
        '503': { $ref: '#/components/responses/Busy' }
        '504': { $ref: '#/components/responses/UpstreamTimeout' }

  /actors/{actorId}/balances:
    get:
      tags: [state]
      operationId: listBalances
      summary: List all (resource, amount) balances for an actor.
      description: |
        Reads the eventually-consistent `knomosis-indexer` per-(actor, resource)
        balance view (abi.md §11A.2). Unknown actors return an empty list
        (balances default to zero in the kernel). Supports `ETag` /
        `If-None-Match` revalidation keyed on the indexer cursor.
      parameters:
        - $ref: '#/components/parameters/ActorId'
      responses:
        '200':
          description: Balance list at the indexer cursor in `X-Knomosis-Seq`.
          headers:
            X-Knomosis-Seq: { $ref: '#/components/headers/KnomosisSeq' }
            ETag:
              description: Weak validator derived from (actor, cursor).
              schema: { type: string }
            Cache-Control:
              description: Short-lived; the indexer advances continuously.
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BalanceList' }
        '304': { description: Not modified (ETag matched `If-None-Match`). }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503': { $ref: '#/components/responses/UpstreamUnavailable' }

  /actors/{actorId}/balances/{resource}:
    get:
      tags: [state]
      operationId: getBalance
      summary: Get one (actor, resource) balance.
      description: |
        Returns the indexed balance for a single resource. A resource the actor
        has never held returns amount `"0"` (kernel `getD 0` semantics), not 404.
      parameters:
        - $ref: '#/components/parameters/ActorId'
        - $ref: '#/components/parameters/Resource'
      responses:
        '200':
          description: The (actor, resource) balance at the indexer cursor.
          headers:
            X-Knomosis-Seq: { $ref: '#/components/headers/KnomosisSeq' }
            ETag: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Balance' }
        '304': { description: Not modified. }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503': { $ref: '#/components/responses/UpstreamUnavailable' }

  /actors/{actorId}/budget:
    get:
      tags: [state]
      operationId: getBudget
      summary: Get an actor's epoch budget view (Workstream GP).
      description: Reads the indexer budget view (abi.md §11A.4) for the current epoch.
      parameters:
        - $ref: '#/components/parameters/ActorId'
      responses:
        '200':
          description: The actor's budget view.
          headers:
            X-Knomosis-Seq: { $ref: '#/components/headers/KnomosisSeq' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BudgetView' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503': { $ref: '#/components/responses/UpstreamUnavailable' }

  /pools/{poolId}:
    get:
      tags: [state]
      operationId: getPool
      summary: Get a gas-pool resource view (Workstream GP).
      description: |
        Reads the indexer gas-pool ledger (abi.md §11A.4) for a single
        (pool actor, resource). The `resource` query parameter selects the
        ledger (`0` = ETH, `1` = BOLD); it defaults to `0` when omitted. A
        pool actor with no recorded inflows returns balance `"0"` (not 404),
        matching the balance endpoints.

        The `net` field is `true` only when this `poolId` is the gateway's
        configured `--gas-pool-actor` (the one actor whose pool the indexer
        nets of drains); every other pool reports gross inflows
        (`net = false`). The gateway's `--gas-pool-actor` MUST match the
        indexer's — the indexer does not persist it, so the gateway cannot
        self-verify the match (an operator obligation, §9.2).
      parameters:
        - $ref: '#/components/parameters/PoolId'
        - $ref: '#/components/parameters/PoolResource'
      responses:
        '200':
          description: The pool resource view.
          headers:
            X-Knomosis-Seq: { $ref: '#/components/headers/KnomosisSeq' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PoolView' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503': { $ref: '#/components/responses/UpstreamUnavailable' }

  /events:
    get:
      tags: [events]
      operationId: listEvents
      summary: Cursor-paginated event backfill.
      description: |
        Returns events with `seq` strictly greater than `since`, drawn from the
        event-subscribe keep-history cache (abi.md §11.3). The complement of
        `GET /events/stream` for catch-up after a gap.

        Paging is GROUP-COMPLETE: because one `seq` may carry several records
        (§11.4), a page never ends mid-group — the server rounds up to the next
        seq boundary at/after `limit`, so `nextCursor` is always a completed
        seq and resuming from it neither skips a group's tail nor redelivers
        its head. `limit` is therefore a soft lower bound. The scan is bounded
        by the tip captured when the request starts (it does not block for
        future live events); `hasMore: false` means "caught up to that tip".

        `since=0` means "from the oldest retained" (NOT live-tail — that is the
        SSE meaning). If `since` predates the history window, responds 409 with
        the oldest resumable seq (maps to the §11 `TRUNCATED` frame).
      parameters:
        - $ref: '#/components/parameters/SinceCursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/EventTypeFilter'
      responses:
        '200':
          description: A page of events plus the next cursor.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EventPage' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/TruncatedCursor' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503': { $ref: '#/components/responses/UpstreamUnavailable' }

  /events/stream:
    get:
      tags: [events]
      operationId: streamEvents
      summary: Live event stream (Server-Sent Events).
      description: |
        A `text/event-stream` that proxies an event-subscribe SUBSCRIBE session
        (abi.md §11). Each event is emitted as an SSE record:

            id: <seq>.<index>
            event: <eventType>
            data: <JSON Event>

        The SSE `id` is the COMPOSITE `"<seq>.<index>"` (NOT a bare seq). A
        single log frame can emit several events sharing one `seq` (abi.md
        §11.4); per the WHATWG SSE spec the browser's last-event-ID buffer
        advances only on an `id:` line, so a bare-seq id would lose a group's
        tail on a mid-group reconnect. With the composite id, on reconnect the
        browser's `Last-Event-ID` (e.g. `"104233.1"`) is honoured exactly:
        the client receives every record after that `(seq, index)` in order,
        with no loss and no duplication (records already delivered for that
        seq are skipped). `Last-Event-ID` takes precedence over the `since`
        query parameter; a bare seq or `since=S` resumes at `seq > S` (S's
        whole group excluded). Heartbeat comment lines (`:\n`) carry no `id:`
        (they must not move the resume cursor).

        On cursor truncation (`TRUNCATED`) the server emits an `event: error`
        record carrying `EventStreamError` (`truncated`, with the oldest
        resumable seq) and closes. A client whose resume point predates the
        gateway's in-memory fan-out ring (but is still within upstream
        history) receives `event: error` (`behind`, with the oldest ring seq)
        steering it to the `GET /events` backfill; it then reconnects into the
        now-covering ring. `since`/`Last-Event-ID` == 0 means live-tail.
      parameters:
        - $ref: '#/components/parameters/SinceCursor'
        - $ref: '#/components/parameters/LastEventId'
        - $ref: '#/components/parameters/EventTypeFilter'
      responses:
        '200':
          description: An open SSE stream.
          headers:
            Cache-Control:
              description: Always `no-store` for streams.
              schema: { type: string }
          content:
            text/event-stream:
              schema:
                type: string
                description: SSE-framed records; see operation description.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/TruncatedCursor' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503': { $ref: '#/components/responses/UpstreamUnavailable' }

  /info:
    get:
      tags: [system]
      operationId: getInfo
      summary: Gateway + kernel metadata.
      description: |
        Surfaces the deployment id, the kernel's declared `Verdict::Ok`
        admission stage (abi.md §10.2.1), the submit/events protocol versions,
        the current indexer cursor + on-disk schema version, and the echoed
        budget/pool config (so a gateway/indexer config drift is observable).
      responses:
        '200':
          description: Service metadata.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Info' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /healthz:
    # The liveness/readiness probes are served at the process ROOT, not
    # under the /v1 API basePath (the universal orchestrator convention),
    # so they override the global /v1 server with the bare root URLs.
    servers:
      - url: https://gateway.dev.example
        description: Development gateway root (probes are not under /v1).
      - url: https://gateway.example
        description: Production gateway root.
    get:
      tags: [system]
      operationId: healthz
      summary: Liveness probe.
      security: []
      responses:
        '200':
          description: Process is alive.
          content:
            text/plain:
              schema: { type: string, examples: ["ok"] }

  /readyz:
    servers:
      - url: https://gateway.dev.example
        description: Development gateway root (probes are not under /v1).
      - url: https://gateway.example
        description: Production gateway root.
    get:
      tags: [system]
      operationId: readyz
      summary: Readiness probe (upstreams reachable).
      security: []
      responses:
        '200':
          description: Gateway and all upstreams are reachable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Readiness' }
        '503':
          description: One or more upstreams are unreachable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Readiness' }

  /rpc:
    # A minimal, READ-ONLY Ethereum JSON-RPC shim so a browser wallet can
    # "Add Network" and target the Knomosis L2 chain id. Knomosis is NOT an
    # EVM chain: L2 actions are submitted via POST /v1/actions (a client-
    # signed EIP-712 SignedAction), so this endpoint answers ONLY the read-
    # only methods a wallet calls when adding + probing a network. Served at
    # the process ROOT (not under /v1), and auth-exempt (a wallet cannot
    # present the bearer service credential; every value here is public).
    servers:
      - url: https://gateway.dev.example
        description: Development gateway root (the RPC shim is not under /v1).
      - url: https://gateway.example
        description: Production gateway root.
    post:
      tags: [system]
      operationId: rpc
      summary: Read-only Ethereum JSON-RPC shim for wallet network discovery.
      description: >-
        Supports eth_chainId (the L2 chain id as 0x-hex), net_version (the
        L2 chain id as a decimal string), eth_blockNumber (the indexer
        cursor as a 0x-hex advance height), and web3_clientVersion. Any
        other method returns JSON-RPC error -32601. A single request or a
        batch array is accepted; the HTTP status is always 200 (protocol
        errors are carried in the JSON-RPC `error` member).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JsonRpcRequest' }
      responses:
        '200':
          description: The JSON-RPC response (or a batch array of responses).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/JsonRpcResponse'
                  - type: array
                    items: { $ref: '#/components/schemas/JsonRpcResponse' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: >-
        Service token presented by the Licio BFF (server-to-server). This is NOT
        a user credential — end-user authN/session lives at the BFF edge.
    mtls:
      type: mutualTLS
      description: Optional mutual TLS between the BFF and the gateway.

  parameters:
    ActorId:
      name: actorId
      in: path
      required: true
      description: Opaque actor identifier (e.g. a 0x-prefixed address or its mapped ActorId).
      schema: { $ref: '#/components/schemas/ActorId' }
    Resource:
      name: resource
      in: path
      required: true
      description: Resource identifier.
      schema: { $ref: '#/components/schemas/Resource' }
    PoolId:
      name: poolId
      in: path
      required: true
      description: Gas-pool identifier.
      schema: { type: string, minLength: 1 }
    PoolResource:
      name: resource
      in: query
      required: false
      description: >-
        Which pool ledger to read: "0" (ETH) or "1" (BOLD). Defaults to
        "0" when omitted. Any other value is a 400.
      schema:
        type: string
        enum: ["0", "1"]
        default: "0"
    SinceCursor:
      name: since
      in: query
      required: false
      description: Return events whose seq is strictly greater than this cursor. Default "0".
      schema: { $ref: '#/components/schemas/Cursor' }
    Limit:
      name: limit
      in: query
      required: false
      description: Maximum number of events to return.
      schema: { type: integer, minimum: 1, maximum: 1000, default: 100 }
    EventTypeFilter:
      name: type
      in: query
      required: false
      description: Optional repeatable event-type filter (omit for all types).
      style: form
      explode: true
      schema:
        type: array
        items: { type: string }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Client-chosen key (e.g. the action nonce) to dedup in-flight retries.
      schema: { type: string, maxLength: 255 }
    LastEventId:
      name: Last-Event-ID
      in: header
      required: false
      description: >-
        SSE reconnect cursor. The gateway emits COMPOSITE event ids
        `"<seq>.<index>"` (the within-seq record position, §11.4), so a
        browser auto-reconnect replays that exact value here; a bare
        `"<seq>"` (or `0`) is also accepted (seq-granular / live-tail).
        Takes precedence over the `since` query parameter.
      schema:
        type: string
        pattern: '^[0-9]+(\.[0-9]+)?$'
        description: A bare seq `"<seq>"` or a composite `"<seq>.<index>"`.
        examples: ["0", "104233", "104233.1"]

  headers:
    KnomosisSeq:
      description: Indexer cursor (seq) the response reflects, as a decimal string.
      schema: { $ref: '#/components/schemas/Cursor' }
    RetryAfter:
      description: Seconds the client should wait before retrying.
      schema: { type: integer, minimum: 0 }

  responses:
    ParseError:
      description: Malformed request (maps to Verdict::ParseError / bad JSON / bad base64).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            parse:
              value: { type: "https://knomosis/errors/parse-error", title: "Malformed action bytes", status: 400 }
    BadRequest:
      description: >-
        A malformed path or query parameter (e.g. a non-numeric actor /
        resource / pool id, or a pool resource selector outside {0, 1}).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            badRequest:
              value: { type: "https://knomosis/errors/bad-request", title: "Bad Request", status: 400 }
    Unauthorized:
      description: Missing or invalid service credential.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    Forbidden:
      description: Credential valid but not permitted for this operation.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    NotFound:
      description: Resource does not exist.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    TruncatedCursor:
      description: Requested cursor predates the keep-history window (maps to §11 TRUNCATED).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            truncated:
              value:
                type: "https://knomosis/errors/truncated-cursor"
                title: "Cursor older than history window"
                status: 409
                oldestSeq: "98123"
    PayloadTooLarge:
      description: Submitted action exceeds the configured maximum frame size.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    UnsupportedMediaType:
      description: >-
        The submit Content-Type is neither application/octet-stream (raw CBE
        bytes) nor application/json (a base64 ActionSubmission).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            unsupported:
              value: { type: "https://knomosis/errors/unsupported-media-type", title: "Unsupported Media Type", status: 415 }
    RateLimited:
      description: Per-credential rate limit exceeded.
      headers:
        Retry-After: { $ref: '#/components/headers/RetryAfter' }
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    Busy:
      description: Host worker queue is full (maps to Verdict::Busy); retry with backoff.
      headers:
        Retry-After: { $ref: '#/components/headers/RetryAfter' }
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            busy:
              value: { type: "https://knomosis/errors/busy", title: "Host busy", status: 503 }
    UpstreamUnavailable:
      description: The gateway could not reach an upstream (host / event-subscribe / indexer).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    UpstreamTimeout:
      description: An upstream did not respond within the configured deadline.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }

  schemas:
    BigInt:
      type: string
      pattern: '^[0-9]+$'
      description: A non-negative integer (64-bit or wider) serialized as a decimal string.
      examples: ["0", "1000000000000000000"]
    Cursor:
      type: string
      pattern: '^[0-9]+$'
      default: "0"
      description: A monotonic event sequence number (seq) as a decimal string; "0" = beginning / live-tail.
    ActorId:
      type: string
      pattern: '^[0-9]+$'
      description: >-
        Indexer actor id (the §11A.2 keyspace u64) as a decimal string.
        Resolution from an on-chain address to this id happens upstream
        (l1-ingest address book); see OQ-GW-7.
      examples: ["161"]
    Resource:
      type: string
      pattern: '^[0-9]+$'
      description: >-
        Resource id (the §11A.2 keyspace u64) as a decimal string.
        Well-known: "0" = ETH, "1" = BOLD.
      examples: ["0", "1"]

    ActionSubmission:
      type: object
      additionalProperties: false
      required: [signedAction]
      properties:
        signedAction:
          type: string
          contentEncoding: base64
          contentMediaType: application/octet-stream
          description: Canonical CBE SignedAction bytes, base64-encoded. Forwarded verbatim (never re-encoded).
        encoding:
          type: string
          enum: [cbe]
          default: cbe
          description: Encoding of the decoded bytes; only `cbe` is defined.

    VerdictResponse:
      type: object
      required: [accepted, verdict]
      properties:
        accepted:
          type: boolean
          description: True iff verdict == Ok.
        verdict:
          type: string
          enum: [Ok, NotAdmissible, ParseError, Busy]
          description: Kernel verdict (abi.md §10.2).
        reason:
          type: [string, "null"]
          description: UTF-8 reason for NotAdmissible (e.g. InsufficientBudget); null otherwise.
        admissionStage:
          type: [string, "null"]
          enum: [Received, LocallyAdmitted, Sequenced, Finalized, "null"]
          description: Stage the kernel's Ok commits to (abi.md §10.2.1).
        seq:
          type: [string, "null"]
          pattern: '^[0-9]+$'
          description: >-
            Log seq the admitted action advanced to. NULL by default: the host
            verdict frame (abi.md §10.1) does not return a seq today; populating
            this needs a correlation mechanism or a host extension (OQ-GW-6).

    Balance:
      type: object
      required: [resource, amount, seq]
      properties:
        resource: { $ref: '#/components/schemas/Resource' }
        amount: { $ref: '#/components/schemas/BigInt' }
        seq: { $ref: '#/components/schemas/Cursor' }
    BalanceList:
      type: object
      required: [actorId, balances, seq]
      properties:
        actorId: { $ref: '#/components/schemas/ActorId' }
        balances:
          type: array
          items: { $ref: '#/components/schemas/Balance' }
        seq: { $ref: '#/components/schemas/Cursor' }

    BudgetView:
      type: object
      required: [actorId, epoch, remaining, seq]
      description: Per-actor epoch budget view (Workstream GP; abi.md §11A.4).
      properties:
        actorId: { $ref: '#/components/schemas/ActorId' }
        epoch: { $ref: '#/components/schemas/BigInt' }
        freeTier: { $ref: '#/components/schemas/BigInt' }
        remaining:
          type: string
          pattern: '^[0-9]+$'
          description: >-
            Indexer-computed `freeTier + grants_this_epoch − consumed_this_epoch`.
            A CONSERVATIVE LOWER BOUND on the kernel's authoritative budget in
            general (exact only when freeTier=0 or carryover ≤ freeTier; abi.md
            §11A.4). Not to be presented as exact until the G6 read path lands.
        actionCost: { $ref: '#/components/schemas/BigInt' }
        gasBalance:
          type: [string, "null"]
          pattern: '^[0-9]+$'
        seq: { $ref: '#/components/schemas/Cursor' }

    PoolView:
      type: object
      required: [poolId, resource, balance, net, seq]
      description: >-
        Per-(pool-actor, resource) gas-pool ledger (abi.md §11A.4). `resource`
        is "0" (ETH) or "1" (BOLD). `balance` is net of drains when this pool
        is the configured gas-pool actor, else gross inflows; `net` says which.
      properties:
        poolId:
          type: string
          pattern: '^[0-9]+$'
          description: Gas-pool actor id (the §11A.2 keyspace u64) as a decimal string.
        resource: { $ref: '#/components/schemas/Resource' }
        balance: { $ref: '#/components/schemas/BigInt' }
        net:
          type: boolean
          description: >-
            True when poolId is the gateway's configured --gas-pool-actor (so
            the balance is net of drains); false for any other pool (gross).
        seq: { $ref: '#/components/schemas/Cursor' }

    Event:
      type: object
      required: [seq, index, type, payload]
      properties:
        seq: { $ref: '#/components/schemas/Cursor' }
        index:
          type: integer
          minimum: 0
          description: >-
            0-based position of this record within its `seq` group. A single
            log frame (one `seq`) can emit several events (abi.md §11.4, e.g.
            a transfer's sender + receiver `balanceChanged`); `index` orders
            them within the seq in `extractEvents` order. On the SSE stream
            the record id is the composite `"<seq>.<index>"`, which lets a
            mid-group reconnect resume exactly (it is also surfaced here so a
            consumer can dedup on `(seq, index)` independently of transport).
        type:
          type: string
          description: Event-type name from the abi.md §11A.5 registry (tags 0..22).
          examples: ["balanceChanged"]
        actor:
          type: [string, "null"]
          description: Subject actor, if the event has one.
        resource:
          type: [string, "null"]
        payload:
          type: object
          additionalProperties: true
          description: Event-type-specific fields (big integers as strings).
      examples:
        - seq: "104233"
          index: 0
          type: balanceChanged
          actor: "161"
          resource: "0"
          payload: { resource: "0", actor: "161", oldValue: "1000", newValue: "950" }
    EventPage:
      type: object
      required: [events, nextCursor, hasMore]
      properties:
        events:
          type: array
          items: { $ref: '#/components/schemas/Event' }
        nextCursor: { $ref: '#/components/schemas/Cursor' }
        hasMore: { type: boolean }
    EventStreamError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          enum: [truncated, lag_exceeded, server_shutdown, behind, decode_error]
          description: >-
            `truncated` (resume predates upstream history), `lag_exceeded` /
            `server_shutdown` (abi.md §11.2), `behind` (resume predates the
            gateway's fan-out ring — catch up via `GET /events`, then
            reconnect), or `decode_error` (a known-tag event payload failed to
            decode — corruption; the gateway fails closed rather than skip or
            mislabel it). All are followed by stream close.
        oldestSeq:
          type: [string, "null"]
          pattern: '^[0-9]+$'
          description: >-
            For `truncated`, the oldest resumable upstream seq; for `behind`,
            the oldest seq currently in the gateway ring.

    Info:
      type: object
      required:
        [deploymentId, l2ChainId, okAdmissionStage, submitProtocolVersion,
         eventsProtocolVersion, indexerSeq, indexerSchemaVersion, budgetPolicy]
      properties:
        deploymentId: { type: string }
        l2ChainId:
          type: integer
          minimum: 1
          description: >-
            The canonical Knomosis L2 chain id (EIP-155): 8357 =
            production (mainnet-settled), 83572 = test. Distinct from the L1
            settlement chain; constant across L1s of the same tier. This is
            the chain id a wallet adds (see POST /rpc) and signs L2 actions
            against (the EIP-712 KnomosisAction domain). MUST match the
            deploy manifest's l2ChainId (--l2-chain-id).
        okAdmissionStage:
          type: string
          enum: [Received, LocallyAdmitted, Sequenced, Finalized]
        submitProtocolVersion: { type: integer, minimum: 1 }
        eventsProtocolVersion: { type: integer, minimum: 1 }
        indexerSeq: { $ref: '#/components/schemas/Cursor' }
        indexerSchemaVersion:
          type: [integer, "null"]
          minimum: 1
          description: >-
            The on-disk indexer schema version, or null when reads are
            disabled (no --indexer-db).
        budgetPolicy: { $ref: '#/components/schemas/BudgetPolicyEcho' }
        kernel:
          type: string
          description: Kernel implementation behind the host (e.g. CommandKernel).
    BudgetPolicyEcho:
      type: object
      required: [freeTier, actionCost, epochLength, gasPoolActor]
      description: >-
        The gateway's echoed budget / gas-pool configuration. These are
        operator obligations the gateway cannot self-verify (§9.2);
        surfacing them here makes a gateway/indexer config drift
        observable. `gasPoolActor` is null when --gas-pool-actor is unset.
      properties:
        freeTier: { $ref: '#/components/schemas/BigInt' }
        actionCost: { $ref: '#/components/schemas/BigInt' }
        epochLength: { $ref: '#/components/schemas/BigInt' }
        gasPoolActor:
          type: [string, "null"]
          pattern: '^[0-9]+$'
          description: The configured gas-pool actor id, or null if unset.
    Readiness:
      type: object
      required: [ready, host, subscribe, indexer]
      properties:
        ready: { type: boolean }
        host: { type: boolean }
        subscribe: { type: boolean }
        indexer: { type: boolean }
    JsonRpcRequest:
      type: object
      required: [method]
      description: >-
        A JSON-RPC 2.0 request. Only the read-only network-discovery methods
        are supported: eth_chainId, net_version, eth_blockNumber,
        web3_clientVersion.
      properties:
        jsonrpc: { type: string, enum: ['2.0'] }
        id:
          description: The request id, echoed on the response (number, string, or null).
        method: { type: string }
        params: { type: array, items: {} }
    JsonRpcResponse:
      type: object
      required: [jsonrpc, id]
      properties:
        jsonrpc: { type: string, enum: ['2.0'] }
        id:
          description: The echoed request id (number, string, or null).
        result:
          description: >-
            The method result (present on success): a 0x-hex quantity
            (eth_chainId / eth_blockNumber) or a string (net_version /
            web3_clientVersion).
        error:
          type: object
          required: [code, message]
          description: Present instead of `result` on a JSON-RPC error.
          properties:
            code: { type: integer }
            message: { type: string }

    Problem:
      type: object
      description: RFC 9457 problem detail; extra members carry Knomosis context.
      additionalProperties: true
      properties:
        type: { type: string, format: uri, default: "about:blank" }
        title: { type: string }
        status: { type: integer, minimum: 100, maximum: 599 }
        detail: { type: [string, "null"] }
        instance: { type: [string, "null"] }
        knomosisReason:
          type: [string, "null"]
          description: Verdict reason string passed through when applicable.
        oldestSeq:
          type: [string, "null"]
          pattern: '^[0-9]+$'
          description: For truncated-cursor errors, the oldest resumable seq.
        retryAfterMs:
          type: [integer, "null"]
          minimum: 0
